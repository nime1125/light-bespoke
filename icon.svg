<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
<defs>
  <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#272727"/>
    <stop offset="100%" stop-color="#131313"/>
  </linearGradient>
  <radialGradient id="knobG" cx="38%" cy="33%" r="72%">
    <stop offset="0%" stop-color="#474747"/>
    <stop offset="42%" stop-color="#2e2e2e"/>
    <stop offset="100%" stop-color="#1c1c1c"/>
  </radialGradient>
  <radialGradient id="innerG" cx="40%" cy="36%" r="65%">
    <stop offset="0%" stop-color="#3b3b3b"/>
    <stop offset="52%" stop-color="#232323"/>
    <stop offset="100%" stop-color="#1a1a1a"/>
  </radialGradient>
  <filter id="cGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="oGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="ks" x="-12%" y="-12%" width="124%" height="124%">
    <feDropShadow dx="0" dy="10" stdDeviation="28" flood-color="#000" flood-opacity="0.92"/>
  </filter>
  <filter id="ts">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.85"/>
  </filter>
</defs>

<!-- Background rounded rect -->
<rect width="1024" height="1024" rx="210" ry="210" fill="url(#bgG)"/>

<!-- Subtle inner shadow rim -->
<rect width="1024" height="1024" rx="210" ry="210" fill="none"
      stroke="rgba(255,255,255,0.04)" stroke-width="3"/>

<!-- Knob outer ring (serrated) -->
<circle cx="512" cy="512" r="378" fill="#1d1d1d"/>
<circle cx="512" cy="512" r="376" fill="none" stroke="#2c2c2c" stroke-width="22" stroke-dasharray="7 3.5"/>
<circle cx="512" cy="512" r="363" fill="none" stroke="#181818" stroke-width="2"/>

<!-- GLOW BACKING LAYERS -->
<path d="M 319.5,845.4 A 385 385 0 0 1 512.0,127.0"
      fill="none" stroke="#00ccff" stroke-width="52" stroke-linecap="round" opacity="0.10"/>
<path d="M 512.0,127.0 A 385 385 0 0 1 704.5,845.4"
      fill="none" stroke="#ff8800" stroke-width="52" stroke-linecap="round" opacity="0.10"/>

<!-- MAIN KNOB BODY -->
<circle cx="512" cy="512" r="358" fill="url(#knobG)" filter="url(#ks)"/>
<circle cx="512" cy="512" r="356" fill="none" stroke="#3c3c3c" stroke-width="1.5"/>
<circle cx="512" cy="512" r="348" fill="none" stroke="#1e1e1e" stroke-width="1"/>

<!-- MAIN COLOR ARCS -->
<!-- Cyan: 7 o'clock to 12 o'clock (clockwise, left+bottom-left) -->
<path d="M 319.5,845.4 A 385 385 0 0 1 512.0,127.0"
      fill="none" stroke="#00ccee" stroke-width="22" stroke-linecap="round" filter="url(#cGlow)"/>
<!-- Orange: 12 o'clock to 5 o'clock (clockwise, right side) -->
<path d="M 512.0,127.0 A 385 385 0 0 1 704.5,845.4"
      fill="none" stroke="#ff8c00" stroke-width="22" stroke-linecap="round" filter="url(#oGlow)"/>

<!-- Inner knob face -->
<circle cx="512" cy="512" r="292" fill="url(#innerG)"/>
<circle cx="512" cy="512" r="290" fill="none" stroke="#303030" stroke-width="1.5"/>

<!-- Tick mark at 12 o'clock -->
<rect x="505" y="230" width="14" height="50" rx="7" fill="#595959"/>
<rect x="505" y="230" width="14" height="50" rx="7" fill="none" stroke="#6a6a6a" stroke-width="1"/>

<!-- Camera aperture blades (6 overlapping ellipses radiating from center) -->
<ellipse cx="512" cy="447" rx="30" ry="72" transform="rotate(0 512 512)" fill="#252525" stroke="#2f2f2f" stroke-width="1.2"/><ellipse cx="512" cy="447" rx="30" ry="72" transform="rotate(60 512 512)" fill="#252525" stroke="#2f2f2f" stroke-width="1.2"/><ellipse cx="512" cy="447" rx="30" ry="72" transform="rotate(120 512 512)" fill="#252525" stroke="#2f2f2f" stroke-width="1.2"/><ellipse cx="512" cy="447" rx="30" ry="72" transform="rotate(180 512 512)" fill="#252525" stroke="#2f2f2f" stroke-width="1.2"/><ellipse cx="512" cy="447" rx="30" ry="72" transform="rotate(240 512 512)" fill="#252525" stroke="#2f2f2f" stroke-width="1.2"/><ellipse cx="512" cy="447" rx="30" ry="72" transform="rotate(300 512 512)" fill="#252525" stroke="#2f2f2f" stroke-width="1.2"/>

<!-- Aperture center cap -->
<circle cx="512" cy="512" r="44" fill="#1d1d1d"/>
<circle cx="512" cy="512" r="42" fill="none" stroke="#2c2c2c" stroke-width="2"/>
<circle cx="512" cy="512" r="18" fill="#252525"/>

<!-- WiFi/signal arcs (pointing up from center) -->
<g fill="none" stroke-linecap="round">
  <path d="M 480,515 A 35 35 0 0 1 544,515" stroke="#484848" stroke-width="12"/>
  <path d="M 460,493 A 57 57 0 0 1 564,493" stroke="#3f3f3f" stroke-width="10"/>
  <path d="M 440,472 A 79 79 0 0 1 584,472" stroke="#363636" stroke-width="8"/>
</g>

<!-- Signal dot -->
<circle cx="512" cy="528" r="12" fill="#3e3e3e"/>

<!-- LIGHT-BESPOKE text -->
<text x="512" y="930"
      font-family="Arial Black, Impact, Helvetica, sans-serif"
      font-weight="900" font-size="58"
      fill="#d5d5d5" text-anchor="middle" letter-spacing="5"
      filter="url(#ts)">LIGHT-BESPOKE</text>

</svg>