name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'main.dart', '.github/workflows/build-apk.yml' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold project
        run: flutter create --org com.lightbespoke --project-name light_bespoke build_app

      - name: Inject main.dart
        run: cp main.dart build_app/lib/main.dart

      - name: Add dependencies
        working-directory: build_app
        run: flutter pub add flutter_blue_plus shared_preferences permission_handler

      - name: Inject BLE permissions
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('build_app/android/app/src/main/AndroidManifest.xml')
          s = p.read_text(encoding='utf-8')
          perms = (
            '    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n'
            '    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n'
            '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n'
          )
          if 'BLUETOOTH_SCAN' not in s:
            s = re.sub(r'(<manifest[^>]*>\n)', r'\1' + perms, s, count=1)
          p.write_text(s, encoding='utf-8')
          print('permissions injected')
          PY

      - name: Build APK
        working-directory: build_app
        run: flutter build apk --release

      - name: Rename APK
        run: cp build_app/build/app/outputs/flutter-apk/app-release.apk light-bespoke.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: LIGHT-BESPOKE Android APK (latest)
          make_latest: true
          files: light-bespoke.apk
          body: "main.dart auto-built APK. Enable install from unknown sources."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-bespoke-apk
          path: light-bespoke.apk
